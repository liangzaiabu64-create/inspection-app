  .item-mgr input { width: 100%; height: 38px; padding: 0 10px; font-size: 14px; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-family: var(--font-sans); box-sizing: border-box; }

  .progress-bar { height: 8px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
  .progress-fill { height: 100%; background: var(--color-text-success); transition: width 0.3s; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }

</style>
</head>

};

const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const currentMonthStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
};
const timeStr = () => {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};
const daysInMonth = (yyyymm) => {
  const [y, m] = yyyymm.split('-').map(Number);
  return new Date(y, m, 0).getDate();
};

// ========== Apps Script API ==========
// CORS制約のため、POSTは text/plain で送る
async function callGAS(action, body = {}) {
  if (!isGasConfigured) throw new Error('GAS未設定');
  const res = await fetch(GAS_URL, {
    method: 'POST',
    mode: 'cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, ...body })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function App() {
  const [machineId, setMachineId] = useState('nid');
  const [tab, setTab] = useState('check');
  
  const [allItems, setAllItems] = useState({ nid: NID_ITEMS, shikomi: SHIKOMI_ITEMS });
  const [allRecords, setAllRecords] = useState({ nid: {}, shikomi: {} });
  
  const [loading, setLoading] = useState(true);
  const [date, setDate] = useState(todayStr());
  const [inspector, setInspector] = useState('');
  const [checker, setChecker] = useState('');

  const [editMode, setEditMode] = useState(false);
  const [syncStatus, setSyncStatus] = useState({ state: 'idle', message: '', at: null });
  
  const [editingItem, setEditingItem] = useState(null);
  const [newItem, setNewItem] = useState({ place: '', side: '', content: '' });

  const [printMonth, setPrintMonth] = useState(currentMonthStr());

  // 保存処理のキュー(連続クリック対策)
  const saveTimerRef = useRef(null);
  const pendingDataRef = useRef(null);

  const items = allItems[machineId] || [];
  const records = allRecords[machineId] || {};
  const machine = MACHINES[machineId];

  useEffect(() => {
    if (!isGasConfigured) { setLoading(false); return; }
    refresh();
  }, []);

  const refresh = async () => {
    if (!isGasConfigured) return;
    setSyncStatus({ state: 'syncing', message: '同期中...', at: null });
    try {
      const data = await callGAS('loadAll');
      const newItems = { ...allItems };
      const newRecords = { ...allRecords };
      for (const mid of ['nid', 'shikomi']) {
        if (data.items && data.items[mid] && data.items[mid].length > 0) {
          newItems[mid] = data.items[mid];
        }
        newRecords[mid] = (data.records && data.records[mid]) || {};
      }
      setAllItems(newItems);
      setAllRecords(newRecords);
      setSyncStatus({ state: 'online', message: '最新です', at: timeStr() });
    } catch (e) {
      console.error(e);
      setSyncStatus({ state: 'error', message: '同期エラー: ' + e.message, at: null });
    }
    setLoading(false);
  };

  // 初回シート初期化(項目が空の時に項目マスタを送る)
  const initializeSheet = async () => {
    if (!confirm('スプレッドシートに初期点検項目(NID 58項目、仕込み 48項目)を書き込みます。\n既存の項目は上書きされます。\n実行しますか?')) return;
    setSyncStatus({ state: 'syncing', message: '初期化中...', at: null });
    try {
      await callGAS('init');
      await callGAS('saveItems', { machineId: 'nid', items: NID_ITEMS });
      await callGAS('saveItems', { machineId: 'shikomi', items: SHIKOMI_ITEMS });
      await refresh();
      alert('初期化完了しました');
    } catch (e) {
      setSyncStatus({ state: 'error', message: '初期化失敗: ' + e.message, at: null });
    }
  };

  const current = records[date] || { results: {}, notes: {}, inspector: '', checker: '' };

  useEffect(() => {
    setInspector(current.inspector || '');
    setChecker(current.checker || '');
  }, [date, machineId, records]);

  // 保存(debounce で連打を1回にまとめる)
  const saveRecord = (dateKey, data) => {
    const newRecs = { ...records, [dateKey]: data };
    setAllRecords(prev => ({ ...prev, [machineId]: newRecs }));
    if (!isGasConfigured) return;
    
    pendingDataRef.current = { machineId, date: dateKey, data };
    setSyncStatus({ state: 'syncing', message: '保存待機中...', at: null });
    
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(async () => {
      const pending = pendingDataRef.current;
      if (!pending) return;
      try {
        setSyncStatus({ state: 'syncing', message: '保存中...', at: null });
        await callGAS('saveRecord', pending);
        setSyncStatus({ state: 'editing', message: '保存しました', at: timeStr() });
      } catch (e) {
        setSyncStatus({ state: 'error', message: '保存失敗: ' + e.message, at: null });
      }
    }, 800);
  };

  const saveItemsToGAS = async (next) => {
    setAllItems(prev => ({ ...prev, [machineId]: next }));
    if (!isGasConfigured) return;
    try {
      setSyncStatus({ state: 'syncing', message: '保存中...', at: null });
      await callGAS('saveItems', { machineId, items: next });
      setSyncStatus({ state: 'editing', message: '保存しました', at: timeStr() });
    } catch (e) {
      setSyncStatus({ state: 'error', message: '保存失敗: ' + e.message, at: null });
    }
  };

  const setResult = (itemId, value) => {
    if (!editMode) return;
    const cur = records[date] || { results: {}, notes: {}, inspector, checker };
    const newResults = { ...cur.results };
    if (newResults[itemId] === value) delete newResults[itemId];
    else newResults[itemId] = value;
    saveRecord(date, { ...cur, results: newResults, inspector, checker });
  };

  const setNote = (itemId, text) => {
    if (!editMode) return;
    const cur = records[date] || { results: {}, notes: {}, inspector, checker };
    saveRecord(date, { ...cur, notes: { ...cur.notes, [itemId]: text }, inspector, checker });
  };

  const updateMeta = (field, value) => {
    if (!editMode) return;
    if (field === 'inspector') setInspector(value);
    if (field === 'checker') setChecker(value);
    const cur = records[date] || { results: {}, notes: {}, inspector, checker };
    saveRecord(date, { ...cur, [field]: value });
  };

  const clearDay = async () => {
    if (!editMode) return;
    if (!confirm(`${date}の点検記録を削除しますか?`)) return;
    saveRecord(date, { results: {}, notes: {}, inspector: '', checker: '' });
    setInspector(''); setChecker('');
  };

  const stats = useMemo(() => {
    const r = current.results || {};
    let ok = 0, ng = 0;
    Object.values(r).forEach(v => { if (v === 'ok') ok++; else if (v === 'ng') ng++; });
    return { ok, ng, done: ok + ng, total: items.length };
  }, [current, items]);

  const grouped = useMemo(() => {
    const g = {};
    items.forEach(it => {
      if (!g[it.place]) g[it.place] = [];
      g[it.place].push(it);
    });
    return g;
  }, [items]);

  const dateList = useMemo(() => 
    Object.keys(records).filter(d => {
      const r = records[d];
      return r && r.results && Object.keys(r.results).length > 0;
    }).sort((a,b) => b.localeCompare(a)), [records]);

  const machineStats = useMemo(() => {
    const stats = {};
    for (const mid of ['nid', 'shikomi']) {
      const recs = allRecords[mid] || {};
      const count = Object.keys(recs).filter(d => {
        const r = recs[d];
        return r && r.results && Object.keys(r.results).length > 0;
      }).length;
      stats[mid] = count;
    }
    return stats;
  }, [allRecords]);

  const addItem = () => {
    if (!newItem.content.trim()) { alert('内容を入力してください'); return; }
    const maxNo = items.reduce((m, it) => Math.max(m, it.no), 0);
    saveItemsToGAS([...items, { ...newItem, no: maxNo + 1, id: 'item_' + (maxNo + 1) }]);
    setNewItem({ place: '', side: '', content: '' });
  };
  const deleteItem = (id) => {
    if (!confirm('この点検項目を削除しますか?\n(過去の記録からは消えません)')) return;
    saveItemsToGAS(items.filter(it => it.id !== id));
  };
  const saveEditItem = () => {
    saveItemsToGAS(items.map(it => it.id === editingItem.id ? editingItem : it));
    setEditingItem(null);
  };

  const doPrintMonth = () => {
    const styleId = 'dynamic-print-style';
    let styleEl = document.getElementById(styleId);
    if (!styleEl) {
      styleEl = document.createElement('style');
      styleEl.id = styleId;
      document.head.appendChild(styleEl);
    }
    styleEl.textContent = `@media print { @page { size: ${machine.paperSize} landscape; margin: 6mm; } }`;
    document.getElementById('print-area').classList.add('show');
    setTimeout(() => {
      window.print();
      setTimeout(() => {
        document.getElementById('print-area').classList.remove('show');
      }, 500);
    }, 100);
  };

  const exportExcel = () => {
    if (typeof XLSX === 'undefined') { alert('Excelライブラリ読み込み中です'); return; }
    const days = daysInMonth(printMonth);
    const [y, m] = printMonth.split('-');
    
    const header = ['No.', '場所', '側', '点検内容'];
    for (let d = 1; d <= days; d++) header.push(String(d));
    header.push('備考');
    
    const aoa = [[`${m}月度 ${machine.name}${machine.subtitle}`], [], header];
    
    items.forEach(it => {
      const row = [it.no, it.place, it.side, it.content];
      const noteCollector = [];
      for (let d = 1; d <= days; d++) {
        const dateKey = `${printMonth}-${String(d).padStart(2,'0')}`;
        const rec = records[dateKey];
        const v = rec && rec.results ? rec.results[it.id] : null;
        row.push(v === 'ok' ? '○' : v === 'ng' ? '×' : '');
        const note = rec && rec.notes ? rec.notes[it.id] : null;
        if (note && v === 'ng') noteCollector.push(`${d}日: ${note}`);
      }
      row.push(noteCollector.join(' / '));
      aoa.push(row);
    });

    aoa.push([]);
    const inspectorRow = ['点検者', '', '', ''];
    const checkerRow = ['確認者', '', '', ''];
    for (let d = 1; d <= days; d++) {
      const dateKey = `${printMonth}-${String(d).padStart(2,'0')}`;
      const rec = records[dateKey];
      inspectorRow.push(rec?.inspector || '');
      checkerRow.push(rec?.checker || '');
    }
    inspectorRow.push(''); checkerRow.push('');
    aoa.push(inspectorRow);
    aoa.push(checkerRow);

    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = [{wch:5},{wch:14},{wch:14},{wch:40}, ...Array.from({length: days}, () => ({wch:4})), {wch:30}];
    ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 4 + days } }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, `${m}月`);
    XLSX.writeFile(wb, `${machine.name}_${printMonth}.xlsx`);
  };

  const exportDailyExcel = () => {
    if (typeof XLSX === 'undefined') { alert('Excelライブラリ読み込み中です'); return; }
    if (!current.results || Object.keys(current.results).length === 0) {
      alert('この日の点検結果がありません'); return;
    }
    const aoa = [
      [`${machine.name}${machine.subtitle}`],
      ['日付', date, '', '点検者', inspector, '確認者', checker],
      [],
      ['No.', '場所', '側', '点検内容', '判定', '備考'],
    ];
    items.forEach(it => {
      const v = current.results[it.id];
      const note = (current.notes && current.notes[it.id]) || '';
      aoa.push([it.no, it.place, it.side, it.content, v === 'ok' ? '○' : v === 'ng' ? '×' : '', note]);
    });
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = [{wch:5},{wch:14},{wch:14},{wch:40},{wch:6},{wch:30}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, date);
    XLSX.writeFile(wb, `${machine.name}_${date}.xlsx`);
  };

  if (loading) return <div className="empty">読み込み中...</div>;

  if (!isGasConfigured) {
    return (
      <div className="app-root">
        <div className="setup-warning">
          <h3><i className="ti ti-alert-triangle" aria-hidden="true"></i> Google Apps Script の設定が必要です</h3>
          <p style={{margin:'8px 0'}}>このHTMLファイルの <code>GAS_URL</code> を、ご自身の Apps Script ウェブアプリURLに書き換えてください。設定方法は添付の SETUP.md を参照してください。</p>
        </div>
      </div>
    );
  }

  const days = daysInMonth(printMonth);
  const [py, pm] = printMonth.split('-');

  return (
    <div className="app-root">
      <h2 className="sr-only">日常点検チェックシート</h2>

      <div className="machine-selector no-print">
        {Object.values(MACHINES).map(m => (
          <button 
            key={m.id} 
            className={`machine-tab ${machineId === m.id ? 'active' : ''}`}
            onClick={() => setMachineId(m.id)}
          >
            <i className={m.id === 'nid' ? 'ti ti-cpu' : 'ti ti-flask'} aria-hidden="true" style={{marginRight:6}}></i>
            {m.name}
            <span className="badge">{machineStats[m.id]}日分</span>
          </button>
        ))}
      </div>

      <div className="sync-bar no-print">
        <span className="sync-status">
          <span className={`sync-dot ${syncStatus.state === 'online' ? 'online' : syncStatus.state === 'editing' ? 'editing' : syncStatus.state === 'error' ? 'error' : ''}`}></span>
          <span>{syncStatus.message || '待機中'}</span>
          {syncStatus.at && <span style={{color:'var(--color-text-tertiary)'}}>({syncStatus.at})</span>}
        </span>
        {SHEET_URL !== 'YOUR_SHEET_URL_HERE' && (
          <a className="sheet-link" href={SHEET_URL} target="_blank" rel="noopener">
            <i className="ti ti-table" aria-hidden="true"></i> シートを開く
          </a>
        )}
        <button className="btn sm" onClick={refresh} style={{marginLeft:'auto'}}>
          <i className="ti ti-refresh" aria-hidden="true"></i> 最新を取得
        </button>
        <button 
          className={`btn sm ${editMode ? 'warning' : 'primary'}`}
          onClick={() => {
            if (editMode) setEditMode(false);
            else if (confirm('編集モードに入ります。\n他の人と同時編集すると、後から保存した方の内容で上書きされます。\n編集を始めますか?')) setEditMode(true);
          }}
        >
          {editMode ? <><i className="ti ti-lock" aria-hidden="true"></i> 編集を終える</> : <><i className="ti ti-edit" aria-hidden="true"></i> 編集モード</>}
        </button>
      </div>

      <div className="tabs no-print">
        <button className={`tab ${tab==='check'?'active':''}`} onClick={()=>setTab('check')}>
          <i className="ti ti-clipboard-check" aria-hidden="true"></i> 点検実施
        </button>
        <button className={`tab ${tab==='history'?'active':''}`} onClick={()=>setTab('history')}>
          <i className="ti ti-history" aria-hidden="true"></i> 履歴 ({dateList.length})
        </button>
        <button className={`tab ${tab==='items'?'active':''}`} onClick={()=>setTab('items')}>
          <i className="ti ti-list-details" aria-hidden="true"></i> 項目管理
        </button>
        <button className={`tab ${tab==='monthly'?'active':''}`} onClick={()=>setTab('monthly')}>
          <i className="ti ti-printer" aria-hidden="true"></i> 月次出力
        </button>
      </div>

      {tab === 'check' && (
        <>
          <div className="top-bar no-print">
            <div className="field">
              <label>日付</label>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:160}}/>
            </div>
            <div className="field">
              <label>点検者</label>
              <input type="text" value={inspector} onChange={e=>updateMeta('inspector',e.target.value)} placeholder="氏名" style={{width:160}} disabled={!editMode}/>
            </div>
            <div className="field">
              <label>確認者</label>
              <input type="text" value={checker} onChange={e=>updateMeta('checker',e.target.value)} placeholder="氏名" style={{width:160}} disabled={!editMode}/>
            </div>
            <div style={{marginLeft:'auto', display:'flex', gap:8}}>
              <button className="btn" onClick={exportDailyExcel}><i className="ti ti-file-spreadsheet" aria-hidden="true"></i>当日Excel</button>
            </div>
          </div>

          <div className="summary no-print">
            <div className="sc"><div className="sc-label">点検済み</div><div className="sc-value">{stats.done}<span style={{fontSize:14,color:'var(--color-text-secondary)'}}> / {stats.total}</span></div></div>
            <div className="sc"><div className="sc-label">○ OK</div><div className="sc-value" style={{color:'var(--color-text-success)'}}>{stats.ok}</div></div>
            <div className="sc"><div className="sc-label">× NG</div><div className="sc-value" style={{color:'var(--color-text-danger)'}}>{stats.ng}</div></div>
            <div className="sc"><div className="sc-label">未点検</div><div className="sc-value" style={{color:'var(--color-text-tertiary)'}}>{stats.total - stats.done}</div></div>
          </div>

          <div className="progress-bar no-print">
            <div className="progress-fill" style={{width: `${(stats.done/stats.total)*100}%`}}/>
          </div>

          <div className="no-print">
            {Object.entries(grouped).map(([place, list]) => (
              <div key={place}>
                <div className="group-header">
                  <i className="ti ti-folder" aria-hidden="true" style={{marginRight:6}}></i>
                  {place} <span style={{fontWeight:400, marginLeft:6}}>({list.length}項目)</span>
                </div>
                {list.map(it => {
                  const v = current.results && current.results[it.id];
                  const note = (current.notes && current.notes[it.id]) || '';
                  return (
                    <div key={it.id} className={`check-row ${v==='ok'?'is-ok':v==='ng'?'is-ng':''} ${!editMode?'readonly':''}`}>
                      <div className="row-no">{it.no}</div>
                      <div className="row-body">
                        <div>
                          <span className="row-place">{it.place}</span>
                          {it.side && <span className="row-side">{it.side}</span>}
                        </div>
                        <div className="row-content">{it.content}</div>
                      </div>
                      <div className="judge-group">
                        <button className={`judge-btn ${v==='ok'?'ok-on':''}`} onClick={()=>setResult(it.id,'ok')} disabled={!editMode} aria-label="OK">○</button>
                        <button className={`judge-btn ${v==='ng'?'ng-on':''}`} onClick={()=>setResult(it.id,'ng')} disabled={!editMode} aria-label="NG">×</button>
                      </div>
                      {v === 'ng' && (
                        <div className="ng-note">
                          <textarea value={note} onChange={e=>setNote(it.id, e.target.value)} placeholder="不具合内容を記入(任意)" disabled={!editMode}/>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>

          <div className="no-print" style={{marginTop:20, display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:8}}>
            <button className="btn danger" onClick={clearDay} disabled={!editMode}><i className="ti ti-trash" aria-hidden="true"></i>この日の記録を削除</button>
            <div style={{display:'flex', gap:8}}>
              <button className="btn" onClick={exportDailyExcel}><i className="ti ti-file-spreadsheet" aria-hidden="true"></i>当日Excel</button>
            </div>
          </div>
        </>
      )}

      {tab === 'history' && (
        <div>
          <div style={{padding:14, background:'var(--color-background-secondary)', borderRadius:'var(--border-radius-lg)', marginBottom:14, fontSize:14, color:'var(--color-text-secondary)'}}>
            {machine.name}の履歴です。「最新を取得」で他の人の入力を反映、「シートを開く」で生データを直接確認できます。
          </div>
          {dateList.length === 0 ? (
            <div className="empty">まだ点検記録がありません</div>
          ) : dateList.map(d => {
            const r = records[d];
            let ok = 0, ng = 0;
            Object.values(r.results || {}).forEach(v => { if (v === 'ok') ok++; else if (v === 'ng') ng++; });
            return (
              <div key={d} className="hist-row">
                <div>
                  <div className="hist-date">{d}</div>
                  <div className="hist-sub">点検者: {r.inspector || '—'} / 確認者: {r.checker || '—'}</div>
                </div>
                <div><span className="pill pill-ok">○ {ok}</span> &nbsp; <span className="pill pill-ng">× {ng}</span></div>
                <div style={{color:'var(--color-text-secondary)', fontSize:13}}>{ok+ng}/{items.length} 完了</div>
                <div><button className="btn sm" onClick={()=>{setDate(d); setTab('check');}}><i className="ti ti-eye" aria-hidden="true"></i>開く</button></div>
              </div>
            );
          })}
        </div>
      )}

      {tab === 'items' && (
        <div>
          <div style={{padding:14, background:'var(--color-background-info)', borderRadius:'var(--border-radius-lg)', marginBottom:14}}>
            <div style={{fontSize:14, fontWeight:500, color:'var(--color-text-info)', marginBottom:10}}>
              <i className="ti ti-plus" aria-hidden="true"></i> {machine.name}の項目を追加 {!editMode && <span style={{color:'var(--color-text-warning)', fontWeight:400}}>(編集モードをONにしてください)</span>}
            </div>
            <div className="item-mgr" style={{background:'var(--color-background-primary)', gridTemplateColumns:'50px 130px 90px 1fr 40px'}}>
              <div style={{fontSize:13, color:'var(--color-text-secondary)'}}>No.自動</div>
              <input value={newItem.place} onChange={e=>setNewItem({...newItem,place:e.target.value})} placeholder="場所" disabled={!editMode}/>
              <input value={newItem.side} onChange={e=>setNewItem({...newItem,side:e.target.value})} placeholder="側(任意)" disabled={!editMode}/>
              <input value={newItem.content} onChange={e=>setNewItem({...newItem,content:e.target.value})} placeholder="点検内容" onKeyDown={e=>e.key==='Enter'&&editMode&&addItem()} disabled={!editMode}/>
              <button className="btn sm primary" onClick={addItem} disabled={!editMode} style={{width:40, padding:0}}><i className="ti ti-plus" aria-hidden="true"></i></button>
            </div>
          </div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
            <div style={{fontSize:13, color:'var(--color-text-secondary)'}}>登録済み点検項目 ({items.length}件)</div>
            <button className="btn sm" onClick={initializeSheet} disabled={!editMode}>
              <i className="ti ti-database-import" aria-hidden="true"></i> 初期項目を投入
            </button>
          </div>
          {items.map(it => (
            <div key={it.id} className="item-mgr">
              <div style={{fontSize:14, fontWeight:500, textAlign:'center'}}>{it.no}</div>
              <div style={{fontSize:13}}>{it.place}</div>
              <div style={{fontSize:12, color:'var(--color-text-secondary)'}}>{it.side || '—'}</div>
              <div style={{fontSize:14}}>{it.content}</div>
              <div style={{display:'flex', gap:4}}>
                <button className="btn sm" onClick={()=>setEditingItem({...it})} disabled={!editMode} style={{width:36, padding:0}} aria-label="編集"><i className="ti ti-edit" aria-hidden="true"></i></button>
                <button className="btn sm danger" onClick={()=>deleteItem(it.id)} disabled={!editMode} style={{width:36, padding:0}} aria-label="削除"><i className="ti ti-trash" aria-hidden="true"></i></button>
              </div>
            </div>
          ))}

          {editingItem && (
            <div className="modal-bg" onClick={e=>e.target===e.currentTarget && setEditingItem(null)}>
              <div className="modal">
                <h3 style={{margin:'0 0 16px', fontSize:18}}>点検項目を編集 (No.{editingItem.no})</h3>
                <div style={{marginBottom:12}}>
                  <label style={{fontSize:13, color:'var(--color-text-secondary)', display:'block', marginBottom:4}}>場所</label>
                  <input value={editingItem.place} onChange={e=>setEditingItem({...editingItem, place:e.target.value})} style={{width:'100%', height:40, padding:'0 10px', border:'1px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)', boxSizing:'border-box', background:'var(--color-background-primary)', color:'var(--color-text-primary)', fontSize:14, fontFamily:'var(--font-sans)'}}/>
                </div>
                <div style={{marginBottom:12}}>
                  <label style={{fontSize:13, color:'var(--color-text-secondary)', display:'block', marginBottom:4}}>側</label>
                  <input value={editingItem.side} onChange={e=>setEditingItem({...editingItem, side:e.target.value})} style={{width:'100%', height:40, padding:'0 10px', border:'1px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)', boxSizing:'border-box', background:'var(--color-background-primary)', color:'var(--color-text-primary)', fontSize:14, fontFamily:'var(--font-sans)'}}/>
                </div>
                <div style={{marginBottom:16}}>
                  <label style={{fontSize:13, color:'var(--color-text-secondary)', display:'block', marginBottom:4}}>内容</label>
                  <textarea value={editingItem.content} onChange={e=>setEditingItem({...editingItem, content:e.target.value})} style={{width:'100%', minHeight:80, padding:'10px', border:'1px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)', boxSizing:'border-box', background:'var(--color-background-primary)', color:'var(--color-text-primary)', fontSize:14, fontFamily:'var(--font-sans)', resize:'vertical'}}/>
                </div>
                <div style={{display:'flex', gap:8, justifyContent:'flex-end'}}>
                  <button className="btn" onClick={()=>setEditingItem(null)}>キャンセル</button>
                  <button className="btn primary" onClick={saveEditItem}><i className="ti ti-device-floppy" aria-hidden="true"></i>保存</button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {tab === 'monthly' && (
        <div>
          <div className="print-config no-print">
            <h3><i className="ti ti-calendar-month" aria-hidden="true"></i> 月次まとめ出力</h3>
            <p style={{margin:'0 0 14px', fontSize:14, color:'var(--color-text-secondary)'}}>
              選択した月の点検記録を1枚にまとめて出力します。<br/>
              印刷: <b>{machine.name} → {machine.paperSize}サイズ横向き</b>。
            </p>
            <div style={{display:'flex', gap:12, alignItems:'flex-end', flexWrap:'wrap'}}>
              <div className="field">
                <label style={{fontSize:13, color:'var(--color-text-secondary)', marginBottom:4, display:'block'}}>対象月</label>
                <input type="month" value={printMonth} onChange={e=>setPrintMonth(e.target.value)} 
                  style={{height:44, padding:'0 12px', fontSize:15, border:'1px solid var(--color-border-secondary)', borderRadius:'var(--border-radius-md)', background:'var(--color-background-primary)', fontFamily:'var(--font-sans)'}}/>
              </div>
              <button className="btn primary" onClick={doPrintMonth}>
                <i className="ti ti-printer" aria-hidden="true"></i> 印刷 ({machine.paperSize}横)
              </button>
              <button className="btn success" onClick={exportExcel}>
                <i className="ti ti-file-spreadsheet" aria-hidden="true"></i> Excel(.xlsx)に変換
              </button>
            </div>
          </div>

          <div style={{padding:14, background:'var(--color-background-secondary)', borderRadius:'var(--border-radius-lg)'}}>
            <h3 style={{margin:'0 0 12px', fontSize:15}}>{pm}月のプレビュー (画面用・縮小表示)</h3>
            <div style={{overflowX:'auto', background:'#fff', padding:10, borderRadius:'var(--border-radius-md)'}}>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:9, color:'#000'}}>
                <thead>
                  <tr style={{background:'#d0d0d0'}}>
                    <th style={{border:'1px solid #333', padding:'2px', minWidth:24}}>No.</th>
                    <th style={{border:'1px solid #333', padding:'2px', minWidth:80}}>場所</th>
                    <th style={{border:'1px solid #333', padding:'2px', minWidth:60}}>側</th>
                    <th style={{border:'1px solid #333', padding:'2px', minWidth:200}}>内容</th>
                    {Array.from({length: days}, (_, i) => (
                      <th key={i} style={{border:'1px solid #333', padding:'2px', width:20, textAlign:'center'}}>{i+1}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {items.map(it => (
                    <tr key={it.id}>
                      <td style={{border:'1px solid #333', padding:'2px', textAlign:'center'}}>{it.no}</td>
                      <td style={{border:'1px solid #333', padding:'2px'}}>{it.place}</td>
                      <td style={{border:'1px solid #333', padding:'2px', fontSize:8}}>{it.side}</td>
                      <td style={{border:'1px solid #333', padding:'2px', fontSize:8}}>{it.content}</td>
                      {Array.from({length: days}, (_, i) => {
                        const dk = `${printMonth}-${String(i+1).padStart(2,'0')}`;
                        const rec = records[dk];
                        const v = rec && rec.results ? rec.results[it.id] : null;
                        return (
                          <td key={i} style={{
                            border:'1px solid #333', padding:'2px', textAlign:'center', 
                            fontWeight:'bold', fontSize:11,
                            color: v==='ok' ? '#060' : v==='ng' ? '#c00' : '#000',
                            background: v==='ng' ? '#ffe8e8' : '#fff'
                          }}>
                            {v==='ok'?'○':v==='ng'?'×':''}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      <div id="print-area">
        <div style={{padding:'4mm', color:'#000', fontFamily:'sans-serif'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:4, borderBottom:'2px solid #000', paddingBottom:3}}>
            <h1 style={{margin:0, fontSize:'14pt'}}>{pm}月度 {machine.name}{machine.subtitle}</h1>
            <div style={{fontSize:'9pt'}}>対象: {printMonth}</div>
          </div>
          <div style={{fontSize:'8pt', marginBottom:4}}>
            ※記入方法: 確認をし異常なければ○、異常があれば×に備考に詳細記入。
          </div>
          <table className="month-table">
            <thead>
              <tr>
                <th style={{width:'18pt'}}>No.</th>
                <th style={{width:'48pt'}}>場所</th>
                <th style={{width:'42pt'}}>側</th>
                <th>点検内容</th>
                {Array.from({length: days}, (_, i) => (
                  <th key={i} className="day-col">{i+1}</th>
                ))}
                <th style={{width:'90pt'}}>備考</th>
              </tr>
            </thead>
            <tbody>
              {items.map(it => {
                const noteList = [];
                const cells = [];
                for (let i = 0; i < days; i++) {
                  const dk = `${printMonth}-${String(i+1).padStart(2,'0')}`;
                  const rec = records[dk];
                  const v = rec && rec.results ? rec.results[it.id] : null;
                  const note = rec && rec.notes ? rec.notes[it.id] : null;
                  if (note && v === 'ng') noteList.push(`${i+1}日:${note}`);
                  cells.push(<td key={i} className={v==='ok'?'ok-cell':v==='ng'?'ng-cell':''}>{v==='ok'?'○':v==='ng'?'×':''}</td>);
                }
                return (
                  <tr key={it.id}>
                    <td style={{textAlign:'center'}}>{it.no}</td>
                    <td>{it.place}</td>
                    <td style={{fontSize:'6pt'}}>{it.side}</td>
                    <td style={{fontSize:'7pt'}}>{it.content}</td>
                    {cells}
                    <td style={{fontSize:'6pt'}}>{noteList.join(' / ')}</td>
                  </tr>
                );
              })}
              <tr>
                <td colSpan={4} style={{fontWeight:'bold', textAlign:'right', paddingRight:6}}>点検者</td>
                {Array.from({length: days}, (_, i) => {
                  const dk = `${printMonth}-${String(i+1).padStart(2,'0')}`;
                  const rec = records[dk];
                  return <td key={i} style={{fontSize:'6pt', textAlign:'center'}}>{rec?.inspector ? rec.inspector.slice(0,3) : ''}</td>;
                })}
                <td></td>
              </tr>
              <tr>
                <td colSpan={4} style={{fontWeight:'bold', textAlign:'right', paddingRight:6}}>確認者</td>
                {Array.from({length: days}, (_, i) => {
                  const dk = `${printMonth}-${String(i+1).padStart(2,'0')}`;
                  const rec = records[dk];
                  return <td key={i} style={{fontSize:'6pt', textAlign:'center'}}>{rec?.checker ? rec.checker.slice(0,3) : ''}</td>;
                })}
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>
</body>
</html>
