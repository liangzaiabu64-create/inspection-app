      h += '<td style="border:1px solid #333;padding:2px;font-size:7pt">'+esc(is.place)+(is.side?' '+esc(is.side):'')+'</td>';
      h += '<td style="border:1px solid #333;padding:2px;font-size:7pt">'+esc(is.content)+'</td>';
      h += '<td style="border:1px solid #333;padding:2px;font-size:7pt">'+esc(is.detail||'')+'</td>';
      h += '<td style="border:1px solid #333;padding:2px;font-size:7pt">'+esc(is.comment||'')+'</td>';
      h += '<td style="border:1px solid #333;padding:2px;text-align:center;font-size:7pt">'+esc(is.assignee||'')+'</td>';
      h += '</tr>';
    });
    h += '</tbody></table>';
  }
  h += '</div>';

  h += '</div>';
  el('print-area').innerHTML = h;
}

// ============================================================
// イベントハンドラ登録
// ============================================================
function attachSyncHandlers(){
  if(el('btn-refresh')) el('btn-refresh').onclick = refresh;
  if(el('btn-editmode')) el('btn-editmode').onclick = toggleEditMode;
}
function attachHandlers(){
  // 設備切替
  var mts = document.querySelectorAll('[data-machine]');
  for(var i=0;i<mts.length;i++){ mts[i].onclick = (function(mid){ return function(){ switchMachine(mid); }; })(mts[i].getAttribute('data-machine')); }
  // タブ
  var tbs = document.querySelectorAll('[data-tab]');
  for(var i=0;i<tbs.length;i++){ tbs[i].onclick = (function(t){ return function(){ switchTab(t); }; })(tbs[i].getAttribute('data-tab')); }
  attachSyncHandlers();

  // 点検タブ
  if(el('inp-date')) el('inp-date').onchange = function(){ flushSave(); STATE.date=this.value; render(); };
  if(el('inp-inspector')) el('inp-inspector').onchange = function(){ updateMeta('inspector', this.value); };
  if(el('inp-checker')) el('inp-checker').onchange = function(){ updateMeta('checker', this.value); };
  var jbs = document.querySelectorAll('[data-result]');
  for(var i=0;i<jbs.length;i++){
    jbs[i].onclick = (function(id,val){ return function(){ setResult(id,val); }; })(jbs[i].getAttribute('data-id'), jbs[i].getAttribute('data-result'));
  }
  var nts = document.querySelectorAll('[data-note]');
  for(var i=0;i<nts.length;i++){
    nts[i].onchange = (function(id){ return function(){ setNote(id, this.value); }; })(nts[i].getAttribute('data-note'));
  }
  if(el('btn-clearday')) el('btn-clearday').onclick = clearDay;

  // 点検フィルタ + NGジャンプ
  var fbs = document.querySelectorAll('[data-filter]');
  for(var i=0;i<fbs.length;i++){ fbs[i].onclick = (function(f){ return function(){ setCheckFilter(f); }; })(fbs[i].getAttribute('data-filter')); }
  if(el('btn-jump-ng')) el('btn-jump-ng').onclick = jumpToNG;

  // 見本写真サムネイル: タップで拡大(点検画面・項目管理リスト共通)
  var phs = document.querySelectorAll('[data-photo]');
  for(var i=0;i<phs.length;i++){
    phs[i].onclick = (function(pid){ return function(){ openPhotoModal(pid); }; })(phs[i].getAttribute('data-photo'));
  }

  // 履歴タブ
  var ods = document.querySelectorAll('[data-opendate]');
  for(var i=0;i<ods.length;i++){ ods[i].onclick = (function(d){ return function(){ openDate(d); }; })(ods[i].getAttribute('data-opendate')); }

  // 不具合タブ
  var ids = document.querySelectorAll('[data-issue-detail]');
  for(var i=0;i<ids.length;i++){ ids[i].onchange = (function(id){ return function(){ updateIssue(id,'detail',this.value,true); }; })(ids[i].getAttribute('data-issue-detail')); }
  var ics = document.querySelectorAll('[data-issue-comment]');
  for(var i=0;i<ics.length;i++){ ics[i].onchange = (function(id){ return function(){ updateIssue(id,'comment',this.value,true); }; })(ics[i].getAttribute('data-issue-comment')); }
  var ias = document.querySelectorAll('[data-issue-assignee]');
  for(var i=0;i<ias.length;i++){ ias[i].onchange = (function(id){ return function(){ updateIssue(id,'assignee',this.value,true); }; })(ias[i].getAttribute('data-issue-assignee')); }
  var iss = document.querySelectorAll('[data-issue-status]');
  for(var i=0;i<iss.length;i++){ iss[i].onchange = (function(id){ return function(){ updateIssue(id,'status',this.value); }; })(iss[i].getAttribute('data-issue-status')); }
  var idl = document.querySelectorAll('[data-issue-delete]');
  for(var i=0;i<idl.length;i++){ idl[i].onclick = (function(id){ return function(){ deleteIssueFromList(id); }; })(idl[i].getAttribute('data-issue-delete')); }

  // 経過観察タブ
  var wds = document.querySelectorAll('[data-watch-detail]');
  for(var i=0;i<wds.length;i++){ wds[i].onchange = (function(id){ return function(){ updateWatch(id,'detail',this.value,true); }; })(wds[i].getAttribute('data-watch-detail')); }
  var wcs = document.querySelectorAll('[data-watch-comment]');
  for(var i=0;i<wcs.length;i++){ wcs[i].onchange = (function(id){ return function(){ updateWatch(id,'comment',this.value,true); }; })(wcs[i].getAttribute('data-watch-comment')); }
  var was = document.querySelectorAll('[data-watch-assignee]');
  for(var i=0;i<was.length;i++){ was[i].onchange = (function(id){ return function(){ updateWatch(id,'assignee',this.value,true); }; })(was[i].getAttribute('data-watch-assignee')); }
  var wss = document.querySelectorAll('[data-watch-status]');
  for(var i=0;i<wss.length;i++){ wss[i].onchange = (function(id){ return function(){ updateWatch(id,'status',this.value); }; })(wss[i].getAttribute('data-watch-status')); }
  var wdl = document.querySelectorAll('[data-watch-delete]');
  for(var i=0;i<wdl.length;i++){ wdl[i].onclick = (function(id){ return function(){ deleteWatchFromList(id); }; })(wdl[i].getAttribute('data-watch-delete')); }
  // 箇所別履歴タブ
  var pts = document.querySelectorAll('[data-point]');
  for(var i=0;i<pts.length;i++){ pts[i].onclick = (function(id){ return function(){ openPointHist(id); }; })(pts[i].getAttribute('data-point')); }
  if(el('point-search')){ el('point-search').oninput = function(){ var q=this.value.toLowerCase(); var rows=document.querySelectorAll('.point-row'); for(var i=0;i<rows.length;i++){ var s=rows[i].getAttribute('data-search')||''; rows[i].style.display = (!q || s.indexOf(q)>=0)?'':'none'; } }; }
  // 項目タブ
  if(el('btn-additem')) el('btn-additem').onclick = addItem;
  if(el('btn-init')) el('btn-init').onclick = initializeSheet;
  if(el('new-content')) el('new-content').onkeydown = function(e){ if(e.key==='Enter'&&STATE.editMode) addItem(); };
  if(el('new-no')) el('new-no').onkeydown = function(e){ if(e.key==='Enter'&&STATE.editMode) addItem(); };
  var eis = document.querySelectorAll('[data-edititem]');
  for(var i=0;i<eis.length;i++){ eis[i].onclick = (function(id){ return function(){ openEditItem(id); }; })(eis[i].getAttribute('data-edititem')); }
  var dis = document.querySelectorAll('[data-delitem]');
  for(var i=0;i<dis.length;i++){ dis[i].onclick = (function(id){ return function(){ deleteItem(id); }; })(dis[i].getAttribute('data-delitem')); }

  // 名簿(点検者・確認者)
  if(el('btn-addstaff')) el('btn-addstaff').onclick = addStaff;
  if(el('new-staff')) el('new-staff').onkeydown = function(e){ if(e.key==='Enter'&&STATE.editMode) addStaff(); };
  var dss = document.querySelectorAll('[data-delstaff]');
  for(var i=0;i<dss.length;i++){ dss[i].onclick = (function(n){ return function(){ deleteStaff(n); }; })(dss[i].getAttribute('data-delstaff')); }

  // 月次タブ
  if(el('inp-month')) el('inp-month').onchange = function(){ STATE.printMonth=this.value; render(); };
  if(el('btn-print')) el('btn-print').onclick = doPrintMonth;
  if(el('btn-excel')) el('btn-excel').onclick = exportExcel;
}

// 同期バーのHTML文字列を生成(render内で使う)
function renderSyncBar(){
  var s = STATE.sync;
  var h = '<div class="sync-bar no-print" id="sync-bar">';
  h += '<span class="sync-status"><span class="sync-dot '+syncDotClass()+'"></span><span>'+esc(s.message||'待機中')+'</span>';
  if(s.at) h += '<span style="color:var(--c-text3)">('+s.at+')</span>';
  h += '</span>';
  if(SHEET_URL!=='YOUR_SHEET_URL_HERE' && /^https:\/\//.test(SHEET_URL)) h += '<a class="sheet-link" href="'+esc(SHEET_URL)+'" target="_blank" rel="noopener">📊 シートを開く</a>';
  h += '<button class="btn sm" id="btn-refresh" style="margin-left:auto">🔄 最新を取得</button>';
  h += '<button class="btn sm '+(STATE.editMode?'warning':'primary')+'" id="btn-editmode">'+(STATE.editMode?'🔒 編集を終える':'✏ 編集モード')+'</button>';
  h += '</div>';
  return h;
}

// 同期バーのDOMだけを部分更新(画面全体は再描画しない)
function updateSyncBar(){
  var existing = el('sync-bar');
  if(!existing || !existing.parentNode) return;
  var tmp = document.createElement('div');
  tmp.innerHTML = renderSyncBar();
  var fresh = tmp.firstChild;
  if(!fresh) return;
  existing.parentNode.replaceChild(fresh, existing);
  attachSyncHandlers();
}

// ============================================================
// 起動
// ============================================================
// ページを閉じる時、未保存データがあれば警告
window.addEventListener('beforeunload', function(e){
  if(pendingData || saveTimer){
    e.preventDefault();
    e.returnValue = '保存中のデータがあります。このまま閉じますか?';
    return e.returnValue;
  }
});

function initScrollTop(){
  if(document.getElementById('scrolltop-btn')) return;
  var btn = document.createElement('button');
  btn.id = 'scrolltop-btn';
  btn.className = 'no-print';
  btn.setAttribute('aria-label','上へ戻る');
  btn.textContent = '↑';
  btn.style.cssText = 'position:fixed;right:16px;bottom:88px;width:50px;height:50px;border-radius:50%;border:none;background:var(--c-info,#1a73e8);color:#fff;font-size:24px;font-weight:700;box-shadow:0 3px 12px rgba(0,0,0,0.28);cursor:pointer;z-index:700;display:none;align-items:center;justify-content:center;padding:0;line-height:1';
  btn.onclick = function(){ window.scrollTo({ top:0, behavior:'smooth' }); };
  document.body.appendChild(btn);
  var onScroll = function(){
    if(document.querySelector('.modal-bg')){ btn.style.display='none'; return; }
    var y = window.pageYOffset || document.documentElement.scrollTop || 0;
    btn.style.display = y > 300 ? 'flex' : 'none';
  };
  window.addEventListener('scroll', onScroll, { passive:true });
  onScroll();
}
try { initScrollTop(); } catch(e){}

try {
  refresh();
} catch(e){
  showFatalError('アプリ起動失敗', e.message + '\n' + (e.stack||''));
}
</script>
