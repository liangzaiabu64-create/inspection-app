<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日常点検チェックシート</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: #ebe9e2;
    color: #1a1a1a;
  }
  #app-container {
    max-width: 1100px; margin: 0 auto;
    background: #ffffff;
    border-radius: 12px;
    padding: 20px;
    min-height: 200px;
  }
  #initial-loader {
    text-align: center;
    padding: 60px 20px;
    color: #5f5e5a;
  }
  #initial-loader h1 {
    font-size: 18px;
    margin: 0 0 16px;
  }
  #initial-loader .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid #e0e0e0;
    border-top-color: #185fa5;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error-display {
    display: none;
    padding: 20px;
    background: #fcebeb;
    border: 1px solid #f7c1c1;
    border-radius: 12px;
    color: #a32d2d;
    margin-bottom: 16px;
  }
  #error-display h3 { margin: 0 0 8px; font-size: 16px; }
  #error-display pre { 
    background: rgba(0,0,0,0.05); 
    padding: 10px; 
    border-radius: 6px; 
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-all;
    margin: 8px 0;
  }
  #lib-status {
    font-size: 12px;
    color: #5f5e5a;
    margin-top: 16px;
  }
  #lib-status .check { color: #3b6d11; }
  #lib-status .fail { color: #a32d2d; font-weight: bold; }
</style>
</head>
<body>
<div id="app-container">
  <div id="error-display"></div>
  <div id="initial-loader">
    <h1>日常点検アプリ 読み込み中...</h1>
    <div class="spinner"></div>
    <div id="lib-status">
      <div id="status-react">React 読み込み中...</div>
      <div id="status-babel">Babel 読み込み中...</div>
      <div id="status-xlsx">XLSX 読み込み中...</div>
      <div id="status-app" style="margin-top:8px;">アプリ初期化待機中...</div>
    </div>
  </div>
  <div id="app"></div>
</div>

<script>
  // エラー表示用ヘルパー
  window.showError = function(title, detail) {
    var el = document.getElementById('error-display');
    var loader = document.getElementById('initial-loader');
    if (loader) loader.style.display = 'none';
    if (el) {
      el.style.display = 'block';
      el.innerHTML = '<h3>⚠ ' + title + '</h3><pre>' + 
        String(detail).replace(/</g,'&lt;').replace(/>/g,'&gt;') + 
        '</pre><p style="font-size:13px;margin-top:12px;">この内容をスクリーンショットで撮って共有してください。</p>';
    }
  };

  // グローバルエラーキャッチ
  window.addEventListener('error', function(e) {
    window.showError('エラーが発生しました', 
      (e.message || 'unknown') + '\n\nファイル: ' + (e.filename || 'unknown') + 
      '\n行: ' + (e.lineno || '?') + ':' + (e.colno || '?'));
  });
  window.addEventListener('unhandledrejection', function(e) {
    window.showError('通信または処理エラー', 
      'reason: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
  });

  // ライブラリ読み込み状態を監視
  function updateStatus(id, label, ok) {
    var el = document.getElementById(id);
    if (el) {
      el.innerHTML = (ok ? '<span class="check">✓</span> ' : '<span class="fail">✗</span> ') + label;
    }
  }

  function checkLibs() {
    updateStatus('status-react', 'React: ' + (typeof React !== 'undefined' ? 'OK' : '未読み込み'), typeof React !== 'undefined');
    updateStatus('status-babel', 'Babel: ' + (typeof Babel !== 'undefined' ? 'OK' : '未読み込み'), typeof Babel !== 'undefined');
    updateStatus('status-xlsx', 'XLSX: ' + (typeof XLSX !== 'undefined' ? 'OK' : '未読み込み'), typeof XLSX !== 'undefined');
    
    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
      window.showError('Reactライブラリが読み込めません', 
        '会社のネットワークが cdnjs.cloudflare.com へのアクセスをブロックしている可能性があります。\n\n対策: 別のブラウザで試す / IT部門に cdnjs.cloudflare.com の許可を依頼 / ライブラリ同梱版の作成を依頼');
      return false;
    }
    if (typeof Babel === 'undefined') {
      window.showError('Babelライブラリが読み込めません', 
        '会社のネットワークが cdnjs.cloudflare.com へのアクセスをブロックしている可能性があります。');
      return false;
    }
    if (typeof XLSX === 'undefined') {
      // XLSXは必須ではないので警告のみ。アプリは動かす
      console.warn('XLSX読み込み失敗 - Excel出力機能は使えません');
    }
    return true;
  }
</script>

      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...body })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;

      const checkerRow = ['確認者', '', '', ''];
      for (let d = 1; d <= days; d++) {
        const dateKey = `${printMonth}-${String(d).padStart(2,'0')}`;
        const rec = records[dateKey];
        inspectorRow.push(rec?.inspector || '');
        checkerRow.push(rec?.checker || '');
      }
      inspectorRow.push(''); checkerRow.push('');
      aoa.push(inspectorRow);
      aoa.push(checkerRow);
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = [{wch:5},{wch:14},{wch:14},{wch:40}, ...Array.from({length: days}, () => ({wch:4})), {wch:30}];
      ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 4 + days } }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, `${m}月`);
      XLSX.writeFile(wb, `${machine.name}_${printMonth}.xlsx`);
    };

    const exportDailyExcel = () => {
      if (typeof XLSX === 'undefined') { alert('Excelライブラリが読み込まれていません'); return; }
      if (!current.results || Object.keys(current.results).length === 0) {
        alert('この日の点検結果がありません'); return;
      }
      const aoa = [
        [`${machine.name}${machine.subtitle}`],
        ['日付', date, '', '点検者', inspector, '確認者', checker],
        [],
        ['No.', '場所', '側', '点検内容', '判定', '備考'],
      ];
      items.forEach(it => {
        const v = current.results[it.id];
        const note = (current.notes && current.notes[it.id]) || '';
        aoa.push([it.no, it.place, it.side, it.content, v === 'ok' ? '○' : v === 'ng' ? '×' : '', note]);
      });
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = [{wch:5},{wch:14},{wch:14},{wch:40},{wch:6},{wch:30}];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, date);
      XLSX.writeFile(wb, `${machine.name}_${date}.xlsx`);
    };

    if (loading) return <div className="empty">読み込み中... (Apps Script と通信中)</div>;

    if (!isGasConfigured) {
      return (
        <div className="app-root">
          <div style={{padding:'20px', background:'#faeeda', border:'1px solid #FAC775', borderRadius:'12px', color:'#854f0b'}}>
            <h3 style={{margin:'0 0 8px'}}>⚠ Google Apps Script の設定が必要です</h3>
            <p>このHTMLファイルの <code style={{background:'rgba(0,0,0,0.05)',padding:'2px 6px',borderRadius:'4px'}}>GAS_URL</code> を、ご自身の Apps Script ウェブアプリURLに書き換えてください。</p>
          </div>
        </div>
      );
    }

    const days = daysInMonth(printMonth);
    const [py, pm] = printMonth.split('-');

    return (
      <div className="app-root">
        <div className="machine-selector no-print">
          {Object.values(MACHINES).map(m => (
            <button key={m.id} className={`machine-tab ${machineId === m.id ? 'active' : ''}`} onClick={() => setMachineId(m.id)}>
              {m.name}
              <span className="badge">{machineStats[m.id]}日分</span>
            </button>
          ))}
        </div>

        <div className="sync-bar no-print">
          <span className="sync-status">
            <span className={`sync-dot ${syncStatus.state === 'online' ? 'online' : syncStatus.state === 'editing' ? 'editing' : syncStatus.state === 'error' ? 'error' : ''}`}></span>
            <span>{syncStatus.message || '待機中'}</span>
            {syncStatus.at && <span style={{color:'#888780'}}>({syncStatus.at})</span>}
          </span>
          {SHEET_URL !== 'YOUR_SHEET_URL_HERE' && (
            <a className="sheet-link" href={SHEET_URL} target="_blank" rel="noopener">📊 シートを開く</a>
          )}
          <button className="btn sm" onClick={refresh} style={{marginLeft:'auto'}}>🔄 最新を取得</button>
          <button 
            className={`btn sm ${editMode ? 'warning' : 'primary'}`}
            onClick={() => {
              if (editMode) setEditMode(false);
              else if (confirm('編集モードに入ります。\n他の人と同時編集すると、後から保存した方の内容で上書きされます。\n編集を始めますか?')) setEditMode(true);
            }}
          >
            {editMode ? '🔒 編集を終える' : '✏ 編集モード'}
          </button>
        </div>

        <div className="tabs no-print">
          <button className={`tab ${tab==='check'?'active':''}`} onClick={()=>setTab('check')}>点検実施</button>
          <button className={`tab ${tab==='history'?'active':''}`} onClick={()=>setTab('history')}>履歴 ({dateList.length})</button>
          <button className={`tab ${tab==='items'?'active':''}`} onClick={()=>setTab('items')}>項目管理</button>
          <button className={`tab ${tab==='monthly'?'active':''}`} onClick={()=>setTab('monthly')}>月次出力</button>
        </div>

        {tab === 'check' && (
          <>
            <div className="top-bar no-print">
              <div className="field"><label>日付</label>
                <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:160}}/>
              </div>
              <div className="field"><label>点検者</label>
                <input type="text" value={inspector} onChange={e=>updateMeta('inspector',e.target.value)} placeholder="氏名" style={{width:160}} disabled={!editMode}/>
              </div>
              <div className="field"><label>確認者</label>
                <input type="text" value={checker} onChange={e=>updateMeta('checker',e.target.value)} placeholder="氏名" style={{width:160}} disabled={!editMode}/>
              </div>
              <div style={{marginLeft:'auto', display:'flex', gap:8}}>
                <button className="btn" onClick={exportDailyExcel}>当日Excel</button>
              </div>
            </div>

            <div className="summary no-print">
              <div className="sc"><div className="sc-label">点検済み</div><div className="sc-value">{stats.done}<span style={{fontSize:14,color:'#5f5e5a'}}> / {stats.total}</span></div></div>
              <div className="sc"><div className="sc-label">○ OK</div><div className="sc-value" style={{color:'#3b6d11'}}>{stats.ok}</div></div>
              <div className="sc"><div className="sc-label">× NG</div><div className="sc-value" style={{color:'#a32d2d'}}>{stats.ng}</div></div>
              <div className="sc"><div className="sc-label">未点検</div><div className="sc-value" style={{color:'#888780'}}>{stats.total - stats.done}</div></div>
            </div>

            <div className="progress-bar no-print">
              <div className="progress-fill" style={{width: `${(stats.done/stats.total)*100}%`}}/>
            </div>

            <div className="no-print">
              {Object.entries(grouped).map(([place, list]) => (
                <div key={place}>
                  <div className="group-header">📁 {place} <span style={{fontWeight:400, marginLeft:6}}>({list.length}項目)</span></div>
                  {list.map(it => {
                    const v = current.results && current.results[it.id];
                    const note = (current.notes && current.notes[it.id]) || '';
                    return (
                      <div key={it.id} className={`check-row ${v==='ok'?'is-ok':v==='ng'?'is-ng':''} ${!editMode?'readonly':''}`}>
                        <div className="row-no">{it.no}</div>
                        <div className="row-body">
                          <div>
                            <span className="row-place">{it.place}</span>
                            {it.side && <span className="row-side">{it.side}</span>}
                          </div>
                          <div className="row-content">{it.content}</div>
                        </div>
                        <div className="judge-group">
                          <button className={`judge-btn ${v==='ok'?'ok-on':''}`} onClick={()=>setResult(it.id,'ok')} disabled={!editMode}>○</button>
                          <button className={`judge-btn ${v==='ng'?'ng-on':''}`} onClick={()=>setResult(it.id,'ng')} disabled={!editMode}>×</button>
                        </div>
                        {v === 'ng' && (
                          <div className="ng-note">
                            <textarea value={note} onChange={e=>setNote(it.id, e.target.value)} placeholder="不具合内容を記入(任意)" disabled={!editMode}/>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>

            <div className="no-print" style={{marginTop:20, display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:8}}>
              <button className="btn danger" onClick={clearDay} disabled={!editMode}>🗑 この日の記録を削除</button>
            </div>
          </>
        )}

        {tab === 'history' && (
          <div>
            <div style={{padding:14, background:'#f5f4ef', borderRadius:'12px', marginBottom:14, fontSize:14, color:'#5f5e5a'}}>
              {machine.name}の履歴。「最新を取得」で他の人の入力を反映、「シートを開く」で生データを直接確認できます。
            </div>
            {dateList.length === 0 ? (
              <div className="empty">まだ点検記録がありません</div>
            ) : dateList.map(d => {
              const r = records[d];
              let ok = 0, ng = 0;
              Object.values(r.results || {}).forEach(v => { if (v === 'ok') ok++; else if (v === 'ng') ng++; });
              return (
                <div key={d} className="hist-row">
                  <div>
                    <div style={{fontSize:15, fontWeight:500}}>{d}</div>
                    <div style={{fontSize:13, color:'#5f5e5a', marginTop:2}}>点検者: {r.inspector || '—'} / 確認者: {r.checker || '—'}</div>
                  </div>
                  <div><span className="pill pill-ok">○ {ok}</span> &nbsp; <span className="pill pill-ng">× {ng}</span></div>
                  <div style={{color:'#5f5e5a', fontSize:13}}>{ok+ng}/{items.length} 完了</div>
                  <div><button className="btn sm" onClick={()=>{setDate(d); setTab('check');}}>👁 開く</button></div>
                </div>
              );
            })}
          </div>
        )}

        {tab === 'items' && (
          <div>
            <div style={{padding:14, background:'#e6f1fb', borderRadius:'12px', marginBottom:14}}>
              <div style={{fontSize:14, fontWeight:500, color:'#185fa5', marginBottom:10}}>
                ➕ {machine.name}の項目を追加 {!editMode && <span style={{color:'#854f0b', fontWeight:400}}>(編集モードをONにしてください)</span>}
              </div>
              <div className="item-mgr" style={{background:'#fff', gridTemplateColumns:'50px 130px 90px 1fr 40px'}}>
                <div style={{fontSize:13, color:'#5f5e5a'}}>No.自動</div>
                <input value={newItem.place} onChange={e=>setNewItem({...newItem,place:e.target.value})} placeholder="場所" disabled={!editMode}/>
                <input value={newItem.side} onChange={e=>setNewItem({...newItem,side:e.target.value})} placeholder="側(任意)" disabled={!editMode}/>
                <input value={newItem.content} onChange={e=>setNewItem({...newItem,content:e.target.value})} placeholder="点検内容" onKeyDown={e=>e.key==='Enter'&&editMode&&addItem()} disabled={!editMode}/>
                <button className="btn sm primary" onClick={addItem} disabled={!editMode} style={{width:40, padding:0}}>+</button>
              </div>
            </div>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
              <div style={{fontSize:13, color:'#5f5e5a'}}>登録済み点検項目 ({items.length}件)</div>
              <button className="btn sm" onClick={initializeSheet} disabled={!editMode}>📥 初期項目を投入</button>
            </div>
            {items.map(it => (
              <div key={it.id} className="item-mgr">
                <div style={{fontSize:14, fontWeight:500, textAlign:'center'}}>{it.no}</div>
                <div style={{fontSize:13}}>{it.place}</div>
                <div style={{fontSize:12, color:'#5f5e5a'}}>{it.side || '—'}</div>
                <div style={{fontSize:14}}>{it.content}</div>
                <div style={{display:'flex', gap:4}}>
                  <button className="btn sm" onClick={()=>setEditingItem({...it})} disabled={!editMode} style={{width:36, padding:0}}>✏</button>
                  <button className="btn sm danger" onClick={()=>deleteItem(it.id)} disabled={!editMode} style={{width:36, padding:0}}>🗑</button>
                </div>
              </div>
            ))}

            {editingItem && (
              <div className="modal-bg" onClick={e=>e.target===e.currentTarget && setEditingItem(null)}>
                <div className="modal">
                  <h3 style={{margin:'0 0 16px', fontSize:18}}>点検項目を編集 (No.{editingItem.no})</h3>
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:13, color:'#5f5e5a', display:'block', marginBottom:4}}>場所</label>
                    <input value={editingItem.place} onChange={e=>setEditingItem({...editingItem, place:e.target.value})} style={{width:'100%', height:40, padding:'0 10px', border:'1px solid rgba(0,0,0,0.15)', borderRadius:'8px', boxSizing:'border-box', fontSize:14}}/>
                  </div>
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:13, color:'#5f5e5a', display:'block', marginBottom:4}}>側</label>
                    <input value={editingItem.side} onChange={e=>setEditingItem({...editingItem, side:e.target.value})} style={{width:'100%', height:40, padding:'0 10px', border:'1px solid rgba(0,0,0,0.15)', borderRadius:'8px', boxSizing:'border-box', fontSize:14}}/>
                  </div>
                  <div style={{marginBottom:16}}>
                    <label style={{fontSize:13, color:'#5f5e5a', display:'block', marginBottom:4}}>内容</label>
                    <textarea value={editingItem.content} onChange={e=>setEditingItem({...editingItem, content:e.target.value})} style={{width:'100%', minHeight:80, padding:'10px', border:'1px solid rgba(0,0,0,0.15)', borderRadius:'8px', boxSizing:'border-box', fontSize:14, resize:'vertical'}}/>
                  </div>
                  <div style={{display:'flex', gap:8, justifyContent:'flex-end'}}>
                    <button className="btn" onClick={()=>setEditingItem(null)}>キャンセル</button>
                    <button className="btn primary" onClick={saveEditItem}>💾 保存</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {tab === 'monthly' && (
          <div>
            <div className="print-config no-print">
              <h3 style={{margin:'0 0 12px', color:'#185fa5'}}>📅 月次まとめ出力</h3>
              <p style={{margin:'0 0 14px', fontSize:14, color:'#5f5e5a'}}>
                印刷: <b>{machine.name} → {machine.paperSize}サイズ横向き</b>。
              </p>
              <div style={{display:'flex', gap:12, alignItems:'flex-end', flexWrap:'wrap'}}>
                <div className="field">
                  <label style={{fontSize:13, color:'#5f5e5a', marginBottom:4, display:'block'}}>対象月</label>
                  <input type="month" value={printMonth} onChange={e=>setPrintMonth(e.target.value)} style={{height:44, padding:'0 12px', fontSize:15, border:'1px solid rgba(0,0,0,0.3)', borderRadius:'8px'}}/>
                </div>
                <button className="btn primary" onClick={doPrintMonth}>🖨 印刷 ({machine.paperSize}横)</button>
                <button className="btn success" onClick={exportExcel}>📊 Excel(.xlsx)に変換</button>
              </div>
            </div>

            <div style={{padding:14, background:'#f5f4ef', borderRadius:'12px'}}>
              <h3 style={{margin:'0 0 12px', fontSize:15}}>{pm}月のプレビュー</h3>
              <div style={{overflowX:'auto', background:'#fff', padding:10, borderRadius:'8px'}}>
                <table style={{width:'100%', borderCollapse:'collapse', fontSize:9, color:'#000'}}>
                  <thead>
                    <tr style={{background:'#d0d0d0'}}>
                      <th style={{border:'1px solid #333', padding:'2px', minWidth:24}}>No.</th>
                      <th style={{border:'1px solid #333', padding:'2px', minWidth:80}}>場所</th>
                      <th style={{border:'1px solid #333', padding:'2px', minWidth:60}}>側</th>
                      <th style={{border:'1px solid #333', padding:'2px', minWidth:200}}>内容</th>
                      {Array.from({length: days}, (_, i) => (
                        <th key={i} style={{border:'1px solid #333', padding:'2px', width:20, textAlign:'center'}}>{i+1}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {items.map(it => (
                      <tr key={it.id}>
                        <td style={{border:'1px solid #333', padding:'2px', textAlign:'center'}}>{it.no}</td>
                        <td style={{border:'1px solid #333', padding:'2px'}}>{it.place}</td>
                        <td style={{border:'1px solid #333', padding:'2px', fontSize:8}}>{it.side}</td>
                        <td style={{border:'1px solid #333', padding:'2px', fontSize:8}}>{it.content}</td>
                        {Array.from({length: days}, (_, i) => {
                          const dk = `${printMonth}-${String(i+1).padStart(2,'0')}`;
                          const rec = records[dk];
                          const v = rec && rec.results ? rec.results[it.id] : null;
                          return (
                            <td key={i} style={{border:'1px solid #333', padding:'2px', textAlign:'center', fontWeight:'bold', fontSize:11,
                              color: v==='ok' ? '#060' : v==='ng' ? '#c00' : '#000',
                              background: v==='ng' ? '#ffe8e8' : '#fff'}}>
                              {v==='ok'?'○':v==='ng'?'×':''}
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        <div id="print-area">
          <div style={{padding:'4mm', color:'#000', fontFamily:'sans-serif'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:4, borderBottom:'2px solid #000', paddingBottom:3}}>
              <h1 style={{margin:0, fontSize:'14pt'}}>{pm}月度 {machine.name}{machine.subtitle}</h1>
              <div style={{fontSize:'9pt'}}>対象: {printMonth}</div>
            </div>
            <div style={{fontSize:'8pt', marginBottom:4}}>※記入方法: 確認をし異常なければ○、異常があれば×に備考に詳細記入。</div>
            <table className="month-table">
              <thead>
                <tr>
                  <th style={{width:'18pt'}}>No.</th>
                  <th style={{width:'48pt'}}>場所</th>
                  <th style={{width:'42pt'}}>側</th>
                  <th>点検内容</th>
                  {Array.from({length: days}, (_, i) => <th key={i} style={{width:18, textAlign:'center'}}>{i+1}</th>)}
                  <th style={{width:'90pt'}}>備考</th>
                </tr>
              </thead>
              <tbody>
                {items.map(it => {
                  const noteList = [];
                  const cells = [];
                  for (let i = 0; i < days; i++) {
                    const dk = `${printMonth}-${String(i+1).padStart(2,'0')}`;
                    const rec = records[dk];
                    const v = rec && rec.results ? rec.results[it.id] : null;
                    const note = rec && rec.notes ? rec.notes[it.id] : null;
                    if (note && v === 'ng') noteList.push(`${i+1}日:${note}`);
                    cells.push(<td key={i} className={v==='ok'?'ok-cell':v==='ng'?'ng-cell':''}>{v==='ok'?'○':v==='ng'?'×':''}</td>);
                  }
                  return (
                    <tr key={it.id}>
                      <td style={{textAlign:'center'}}>{it.no}</td>
                      <td>{it.place}</td>
                      <td style={{fontSize:'6pt'}}>{it.side}</td>
                      <td style={{fontSize:'7pt'}}>{it.content}</td>
                      {cells}
                      <td style={{fontSize:'6pt'}}>{noteList.join(' / ')}</td>
                    </tr>
                  );
                })}
                <tr>
                  <td colSpan={4} style={{fontWeight:'bold', textAlign:'right', paddingRight:6}}>点検者</td>
                  {Array.from({length: days}, (_, i) => {
                    const dk = `${printMonth}-${String(i+1).padStart(2,'0')}`;
                    const rec = records[dk];
                    return <td key={i} style={{fontSize:'6pt', textAlign:'center'}}>{rec?.inspector ? rec.inspector.slice(0,3) : ''}</td>;
                  })}
                  <td></td>
                </tr>
                <tr>
                  <td colSpan={4} style={{fontWeight:'bold', textAlign:'right', paddingRight:6}}>確認者</td>
                  {Array.from({length: days}, (_, i) => {
                    const dk = `${printMonth}-${String(i+1).padStart(2,'0')}`;
                    const rec = records[dk];
                    return <td key={i} style={{fontSize:'6pt', textAlign:'center'}}>{rec?.checker ? rec.checker.slice(0,3) : ''}</td>;
                  })}
                  <td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  // アプリ起動
  try {
    updateStatus('status-app', 'アプリ起動中...', true);
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  } catch (e) {
    window.showError('アプリ起動失敗', e.message + '\n\n' + (e.stack || ''));
  }
}
</script>

</body>
</html>
